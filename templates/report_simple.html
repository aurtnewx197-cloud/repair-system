<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>快速报修 - 智慧物业</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{primary:{50:"#ecfdf5",100:"#d1fae5",200:"#a7f3d0",300:"#6ee7b7",400:"#34d399",500:"#10b981",600:"#059669",700:"#047857",800:"#065f46",900:"#064e3b"}}}}}</script>
</head>
<body class="bg-gray-50 font-sans">

    <!-- 顶栏 -->
    <div class="bg-gradient-to-br from-emerald-600 to-teal-700 px-5 pt-5 pb-8 rounded-b-[32px] shadow-lg">
        <div class="flex items-center gap-3 mb-2">
            <a href="/" class="w-9 h-9 bg-white/20 rounded-xl flex items-center justify-center backdrop-blur-sm">
                <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </a>
            <div>
                <h1 class="text-white text-xl font-bold">快速报修</h1>
                <p class="text-emerald-100 text-xs">选择楼栋，填写信息提交工单</p>
            </div>
        </div>
    </div>

    <div class="px-4 -mt-5 space-y-4 pb-8">

        <!-- 提示信息 -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="bg-orange-50 border border-orange-200 rounded-2xl px-4 py-3 text-orange-700 text-sm flex items-center gap-2 shadow-sm">
            <svg class="w-5 h-5 text-orange-500 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <!-- 表单卡片 -->
        <div class="bg-white rounded-2xl shadow-lg shadow-emerald-100/30 p-5 border border-emerald-50">
            <form action="/report/submit" method="POST" id="reportForm">

                <!-- 楼栋选择 -->
                <div class="mb-5">
                    <label class="text-gray-700 font-semibold text-sm flex items-center gap-1.5 mb-3">
                        <svg class="w-4 h-4 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                        选择楼栋 <span class="text-red-500">*</span>
                    </label>
                    <div class="grid grid-cols-5 gap-2.5">
                        {% for b in buildings %}
                        <label class="flex flex-col items-center cursor-pointer" for="bldg{{ b }}">
                            <input type="radio" name="building" id="bldg{{ b }}" value="{{ b }}"
                                   class="hidden peer" onchange="document.querySelectorAll('.bldg-label').forEach(el=>el.classList.remove('ring-2','ring-emerald-500','bg-emerald-50','border-emerald-500')); this.closest('label').querySelector('.bldg-label').classList.add('ring-2','ring-emerald-500','bg-emerald-50','border-emerald-500')">
                            <div class="bldg-label w-full aspect-square rounded-xl border-2 border-gray-100 bg-gray-50 flex items-center justify-center text-gray-600 font-bold text-sm peer-checked:ring-2 peer-checked:ring-emerald-500 peer-checked:bg-emerald-50 peer-checked:border-emerald-500 transition-all duration-150">
                                {{ b.replace('栋','') }}
                            </div>
                            <span class="text-xs text-gray-400 mt-1">{{ b }}</span>
                        </label>
                        {% endfor %}
                    </div>
                </div>

                <!-- 室号 -->
                <div class="mb-4">
                    <label for="room" class="text-gray-700 font-semibold text-sm flex items-center gap-1.5 mb-1.5">
                        <svg class="w-4 h-4 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                        室号 <span class="text-red-500">*</span>
                    </label>
                    <input type="text" id="room" name="room" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3.5 text-base focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all" placeholder="如：A1002、301">
                </div>

                <!-- 报修内容 -->
                <div class="mb-4">
                    <label for="description" class="text-gray-700 font-semibold text-sm flex items-center gap-1.5 mb-1.5">
                        <svg class="w-4 h-4 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                        报修内容 <span class="text-red-500">*</span>
                    </label>
                    <textarea id="description" name="description" rows="3" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-base focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all resize-none" placeholder="请详细描述故障情况"></textarea>
                </div>

                <!-- 维修类型 -->
                <div class="mb-4">
                    <label for="repair_type" class="text-gray-700 font-semibold text-sm flex items-center gap-1.5 mb-1.5">
                        <svg class="w-4 h-4 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        维修类型
                    </label>
                    <select id="repair_type" name="repair_type" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3.5 text-base focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all">
                        <option value="">请选择类型（选填）</option>
                        {% for t in repair_types %}
                        <option value="{{ t }}">{{ t }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- 联系信息 -->
                <div class="grid grid-cols-2 gap-3 mb-5">
                    <div>
                        <label for="reporter_name" class="text-gray-700 font-semibold text-sm flex items-center gap-1.5 mb-1.5">
                            <svg class="w-4 h-4 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                            联系人
                        </label>
                        <input type="text" id="reporter_name" name="reporter_name" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3.5 py-3 text-sm focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all" placeholder="选填">
                    </div>
                    <div>
                        <label for="reporter_phone" class="text-gray-700 font-semibold text-sm flex items-center gap-1.5 mb-1.5">
                            <svg class="w-4 h-4 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
                            电话
                        </label>
                        <input type="tel" id="reporter_phone" name="reporter_phone" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3.5 py-3 text-sm focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all" placeholder="选填">
                    </div>
                </div>

                <!-- 提交按钮 -->
                <button type="submit" class="w-full bg-gradient-to-r from-emerald-500 to-emerald-600 text-white font-bold text-lg py-4 rounded-2xl shadow-lg shadow-emerald-200 hover:shadow-xl hover:from-emerald-600 hover:to-emerald-700 transition-all duration-200 active:scale-[0.98] flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    提交工单
                </button>
            </form>
        </div>

        <!-- 返回 -->
        <div class="text-center">
            <a href="/" class="inline-flex items-center gap-1 text-gray-400 text-sm hover:text-gray-600 transition-colors">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                返回首页
            </a>
        </div>
    </div>

</body>
</html>
