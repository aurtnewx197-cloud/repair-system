<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>提交成功 - 智慧物业</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{primary:{50:"#ecfdf5",100:"#d1fae5",200:"#a7f3d0",300:"#6ee7b7",400:"#34d399",500:"#10b981",600:"#059669",700:"#047857",800:"#065f46",900:"#064e3b"}}}}}</script>
</head>
<body class="bg-gray-50 font-sans">

    <div class="bg-gradient-to-br from-emerald-600 to-teal-700 px-5 pt-5 pb-8 rounded-b-[32px] shadow-lg">
        <div class="text-center pt-2">
            <div class="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-2 backdrop-blur-sm">
                <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
            </div>
            <h1 class="text-white text-2xl font-bold">提交成功</h1>
            <p class="text-emerald-100 text-sm mt-0.5">您的报修工单已生成</p>
        </div>
    </div>

    <div class="px-4 -mt-5 pb-8">
        <div class="bg-white rounded-2xl shadow-lg shadow-emerald-100/30 p-6 border border-emerald-50 text-center">

            <!-- 工单号 -->
            <div class="bg-gradient-to-br from-emerald-50 to-teal-50 rounded-2xl p-5 mb-4 border border-emerald-100">
                <p class="text-gray-400 text-xs mb-2 flex items-center justify-center gap-1">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    工单号
                </p>
                <p class="text-emerald-600 text-3xl font-bold tracking-[3px] font-mono">{{ work_order }}</p>
            </div>

            <!-- 时间 -->
            <div class="flex items-center justify-center gap-2 text-gray-400 text-sm mb-4">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <span>{{ created_at }}</span>
                <span class="w-1 h-1 bg-gray-300 rounded-full"></span>
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                <span>{{ company_name }}</span>
            </div>

            <p class="text-gray-400 text-xs mb-5">请妥善保管工单号，随时查询维修进度</p>

            <div class="flex gap-3">
                <a href="/track" class="flex-1 bg-gradient-to-r from-emerald-500 to-emerald-600 text-white font-semibold py-3.5 rounded-xl shadow-md shadow-emerald-200 hover:shadow-lg transition-all duration-200 active:scale-[0.98]">
                    查询进度
                </a>
                <a href="/" class="flex-1 bg-gray-100 text-gray-600 font-semibold py-3.5 rounded-xl hover:bg-gray-200 transition-all duration-200 active:scale-[0.98]">
                    返回首页
                </a>
            </div>
        </div>
    </div>

</body>
</html>
